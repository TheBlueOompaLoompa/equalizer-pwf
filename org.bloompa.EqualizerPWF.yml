id: org.bloompa.EqualizerPWF
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: equalizer-pwf
modules:
  - name: equalizer-pwf
    buildsystem: cmake
    builddir: true
    sources:
      - type: dir
        path: "."
    post-install:
      - install -Dm644 equalizer-pwf.desktop $FLATPAK_DEST/share/applications/$FLATPAK_ID.desktop
#      - install -Dm644 $FLATPAK_ID.metainfo.xml $FLATPAK_DEST/share/metainfo/$FLATPAK_ID.metainfo.xml
      - install -Dm644 equalizer-pwf.svg $FLATPAK_DEST/share/icons/hicolor/scalable/apps/$FLATPAK_ID.svg
finish-args:
  # X11 + XShm access
  - --share=ipc
  - --socket=fallback-x11
  # Wayland access
  - --socket=wayland
  # GPU acceleration if needed
  - --device=dri
  # Needs to save files locally
  - --filesystem=home
  - --filesystem=xdg-run/pipewire-0:ro
  - --talk-name=org.kde.StatusNotifierWatcher
